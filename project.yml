name: MusicBar
options:
  bundleIdPrefix: com.temporarystudios
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.4"
  createIntermediateGroups: true

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"

targets:
  MusicBar:
    type: application
    platform: macOS
    sources:
      - MusicBar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.temporarystudios.MusicBar
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        INFOPLIST_FILE: MusicBar/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: MusicBar/Resources/MusicBar.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - package: KeyboardShortcuts
    entitlements:
      path: MusicBar/Resources/MusicBar.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.automation.apple-events: true
